# scrcpy-menu profiles
# One profile per line: Label|Resolution|Package
#   Label      - text shown in the menu
#   Resolution - passed to `scrcpy --new-display=`, format WIDTHxHEIGHT[/DPI]
#   Package    - Android package name to auto-launch (leave blank to just open the display)
#
# Find a package name with: adb shell pm list packages | grep -i <part of app name>
#
# Lines starting with # and blank lines are ignored.

Manga (720x1440 portrait)|720x1440/280|com.google.android.youtube
Shows (2560x1440 landscape)|2560x1440|com.netflix.mediaclient

